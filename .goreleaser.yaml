version: 2

project_name: cch

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: cch
    binary: cch
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: cch
    ids:
      - cch
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

brews:
  - name: cch
    repository:
      owner: Goodmain
      name: homebrew-cch
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/Goodmain/cch"
    description: "cch - interactive helper for project console commands"
    license: "MIT"
    test: |
      system "#{bin}/cch --version"
    install: |
      bin.install "cch"

release:
  github:
    owner: Goodmain
    name: console-command-helper
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
